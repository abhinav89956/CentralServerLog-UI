<div class="card filter-container">
  <form [formGroup]="filterForm" (ngSubmit)="onSubmit()" class="filter-form">
    <div class="form-group">
      <label for="search">Search</label>
      <input id="search" type="text" formControlName="search" class="form-control" placeholder="Search logs...">
    </div>
    <div class="form-group">
      <label for="fromDate">From Date</label>
      <input id="fromDate" type="date" formControlName="fromDate" class="form-control">
    </div>
    <div class="form-group">
      <label for="toDate">To Date</label>
      <input id="toDate" type="date" formControlName="toDate" class="form-control">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Filter</button>
      <button type="button" class="btn-secondary" (click)="onReset()">Reset</button>
    </div>
  </form>
</div>
